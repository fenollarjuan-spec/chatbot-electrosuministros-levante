<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente ElectroSuministros Levante</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F2F4F6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1B3A5C;
      padding: 18px 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #ffffff;
      line-height: 1.3;
    }

    header p {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      color: #a8c8e8;
      margin-top: 3px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .message.bot {
      background: #ffffff;
      border: 1px solid #D6E8F7;
      align-self: flex-start;
      border-radius: 4px 12px 12px 12px;
      color: #1a1a1a;
    }

    .message.user {
      background: #2E6DA4;
      color: #ffffff;
      align-self: flex-end;
      border-radius: 12px 4px 12px 12px;
    }

    .message.typing {
      background: #ffffff;
      border: 1px solid #D6E8F7;
      align-self: flex-start;
      border-radius: 4px 12px 12px 12px;
      color: #888;
      font-style: italic;
    }

    #input-area {
      background: #ffffff;
      border-top: 1px solid #dde3ea;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      border: 1px solid #cdd5de;
      border-radius: 8px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      color: #1a1a1a;
      background: #F2F4F6;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #2E6DA4;
      background: #ffffff;
    }

    #user-input::placeholder {
      color: #9aa5b4;
    }

    #send-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.92rem;
      background: #1B3A5C;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover {
      background: #2E6DA4;
    }

    #send-btn:disabled {
      background: #7a96b0;
      cursor: not-allowed;
    }

    .message.bot p {
      margin: 0 0 8px 0;
    }

    .message.bot p:last-child {
      margin-bottom: 0;
    }

    .message.bot ul,
    .message.bot ol {
      margin: 4px 0 8px 18px;
    }

    .message.bot li {
      margin-bottom: 3px;
    }

    .message.bot strong {
      font-weight: 600;
    }

    .message.bot code {
      background: #eef3f8;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.85em;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>Asistente ElectroSuministros Levante</h1>
    <p>Distribución de material eléctrico · Valencia</p>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="Escribe tu consulta..." autocomplete="off">
    <button id="send-btn">Enviar</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const historial = [];

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.classList.add('message', type);
      if (type === 'bot') {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    addMessage(
      'Hola, soy el asistente de ElectroSuministros Levante. Puedo ayudarte con consultas sobre nuestro catálogo de material eléctrico, plazos de entrega, condiciones comerciales y especificaciones técnicas. ¿En qué puedo ayudarte?',
      'bot'
    );

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;

      addMessage(text, 'user');
      historial.push({ role: 'user', content: text });

      const typing = addMessage('Escribiendo...', 'typing');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ historial })
        });
        const data = await res.json();
        typing.remove();
        const reply = data.respuesta || data.error || 'Error desconocido';
        addMessage(reply, 'bot');
        historial.push({ role: 'assistant', content: reply });
      } catch (err) {
        typing.remove();
        addMessage('Error al conectar con el servidor.', 'bot');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
